<!doctype html>
<html lang="__HTML_LANG__">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__PROJECT_TITLE__ __PAGE_TITLE__</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --ink: #1f2a28;
      --muted: #64706d;
      --line: #c9d1cb;
      --card: #ffffff;
      --accent: #216869;
      --decision: #e7f1ed;
      --principle: #fff1d8;
      --question: #e8ecff;
      --task: #f4e7f1;
      --deprecated: #eee9e1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 28px 36px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
      line-height: 1.15;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .language-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.72);
      flex: 0 0 auto;
    }
    .language-toggle button {
      border: 0;
      border-radius: 6px;
      padding: 6px 9px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .language-toggle button[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .search {
      min-width: min(320px, 100%);
      flex: 1 1 260px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
    }
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .hint {
      flex-basis: 100%;
      color: var(--muted);
      font-size: 12px;
    }
    .filter-button,
    .reset-button,
    .detail-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      background: rgba(255,255,255,0.78);
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .filter-button[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    main {
      padding: 28px 36px 42px;
    }
    .map {
      position: relative;
      min-height: 620px;
      display: grid;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
      gap: 22px;
      align-items: start;
    }
    .lane {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }
    .lane-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding-left: 4px;
    }
    .node {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      padding: 14px 15px;
      box-shadow: 0 8px 22px rgba(31,42,40,0.08);
      cursor: pointer;
      transition: opacity 160ms ease, transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }
    .node:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(31,42,40,0.12);
    }
    .node.is-focused {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(33,104,105,0.18), 0 12px 28px rgba(31,42,40,0.14);
    }
    .node.is-related {
      border-color: rgba(33,104,105,0.45);
    }
    .node.is-dimmed {
      opacity: 0.34;
    }
    .node[data-type="thesis"] { border-color: #72aaa0; background: #edf7f3; }
    .node[data-type="decision"] { background: var(--decision); }
    .node[data-type="principle"] { background: var(--principle); }
    .node[data-type="question"] { background: var(--question); }
    .node[data-type="task"] { background: var(--task); }
    .node[data-type="deprecated"] { background: var(--deprecated); opacity: 0.78; }
    .node h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .node p {
      margin: 9px 0 0;
      color: #33413e;
      font-size: 13px;
      line-height: 1.45;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 11px;
    }
    .badge {
      border: 1px solid rgba(31,42,40,0.16);
      border-radius: 999px;
      padding: 3px 7px;
      color: var(--muted);
      font-size: 11px;
      background: rgba(255,255,255,0.62);
    }
    .links {
      margin: 11px 0 0;
      padding: 9px 0 0;
      border-top: 1px solid rgba(31,42,40,0.12);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .links div + div { margin-top: 4px; }
    .details {
      display: none;
      margin-top: 11px;
      padding-top: 10px;
      border-top: 1px solid rgba(31,42,40,0.12);
      color: #33413e;
      font-size: 12px;
      line-height: 1.45;
    }
    .node[data-expanded="true"] .details {
      display: block;
    }
    .details ul {
      margin: 6px 0 0;
      padding-left: 18px;
    }
    .detail-button {
      margin-top: 11px;
      padding: 6px 8px;
    }
    .empty-result {
      grid-column: 1 / -1;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 24px;
      color: var(--muted);
      background: rgba(255,255,255,0.52);
      text-align: center;
    }
    .timeline {
      margin-top: 30px;
      border-top: 1px solid var(--line);
      padding-top: 22px;
    }
    .timeline h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .entry {
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 18px;
      padding: 12px 0;
      border-top: 1px solid rgba(31,42,40,0.1);
      font-size: 13px;
    }
    .entry time {
      color: var(--muted);
    }
    @media (max-width: 860px) {
      header, main { padding-left: 18px; padding-right: 18px; }
      .map { grid-template-columns: 1fr; }
      .entry { grid-template-columns: 1fr; gap: 4px; }
      .topline { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topline">
      <div>
        <h1>__PROJECT_TITLE__</h1>
        <div id="meta" class="meta"></div>
      </div>
      <div class="language-toggle" aria-label="Language">
        <button id="lang-zh" type="button" data-lang="zh">中文</button>
        <button id="lang-en" type="button" data-lang="en">English</button>
      </div>
    </div>
    <div class="toolbar" role="search">
      <input id="search" class="search" type="search">
      <div id="filters" class="filters" aria-label="Filters"></div>
      <button id="reset" class="reset-button" type="button"></button>
      <div id="hint" class="hint"></div>
    </div>
  </header>
  <main>
    <section id="map" class="map"></section>
    <section class="timeline">
      <h2 id="timeline-title"></h2>
      <div id="timeline"></div>
    </section>
  </main>
  <script id="mindmap-data" type="application/json">__DATA_JSON__</script>
  <script>
    const data = JSON.parse(document.getElementById("mindmap-data").textContent);
    const i18n = {
      zh: {
        meta: `项目思维导图 · 更新于 ${data.project.updatedAt} · 实现前先阅读 context.md`,
        mapLabel: "项目思维导图",
        timeline: "思考历史",
        lanes: [
          ["核心判断", ["thesis"]],
          ["方向与原则", ["principle", "decision", "constraint"]],
          ["问题与执行", ["question", "task", "deprecated"]]
        ],
        emptyTitle: "暂无节点",
        emptyBody: "用 mind-map skill 主动记录一个项目想法。",
        noMatch: "没有匹配的节点",
        searchPlaceholder: "搜索节点、标签、理由或摘要",
        all: "全部",
        reset: "重置",
        details: "详情",
        hideDetails: "收起",
        rationale: "理由",
        implications: "影响",
        related: "关联",
        focusHint: "点击节点聚焦关联关系，按 Esc 取消聚焦。",
        type: {
          thesis: "核心判断",
          principle: "原则",
          decision: "决策",
          constraint: "约束",
          question: "问题",
          task: "任务",
          deprecated: "已废弃"
        },
        status: {
          active: "有效",
          draft: "草稿",
          resolved: "已解决",
          deprecated: "已废弃",
          conflict: "冲突"
        },
        priority: {
          high: "高优先级",
          medium: "中优先级",
          low: "低优先级"
        }
      },
      en: {
        meta: `Project mind map · Updated ${data.project.updatedAt} · Read context.md before implementation`,
        mapLabel: "Project mind map",
        timeline: "Thinking History",
        lanes: [
          ["Thesis", ["thesis"]],
          ["Direction", ["principle", "decision", "constraint"]],
          ["Execution", ["question", "task", "deprecated"]]
        ],
        emptyTitle: "No nodes yet",
        emptyBody: "Record a project thought with the mind-map skill.",
        noMatch: "No matching nodes",
        searchPlaceholder: "Search nodes, tags, rationale, or summaries",
        all: "All",
        reset: "Reset",
        details: "Details",
        hideDetails: "Hide",
        rationale: "Rationale",
        implications: "Implications",
        related: "Related",
        focusHint: "Click a node to focus related links. Press Esc to clear focus.",
        type: {
          thesis: "thesis",
          principle: "principle",
          decision: "decision",
          constraint: "constraint",
          question: "question",
          task: "task",
          deprecated: "deprecated"
        },
        status: {
          active: "active",
          draft: "draft",
          resolved: "resolved",
          deprecated: "deprecated",
          conflict: "conflict"
        },
        priority: {
          high: "high",
          medium: "medium",
          low: "low"
        }
      }
    };
    const defaultLang = data.settings?.language === "en" ? "en" : "zh";
    let currentLang = localStorage.getItem(`mindmap-lang:${data.project.id}`) || defaultLang;
    let query = "";
    let activeType = "all";
    let focusedId = "";
    const map = document.getElementById("map");
    const searchInput = document.getElementById("search");
    const filters = document.getElementById("filters");
    const resetButton = document.getElementById("reset");
    const nodes = data.nodes || [];
    const nodeById = new Map(nodes.map((node) => [node.id, node]));
    const outgoing = new Map();
    const incoming = new Map();
    (data.edges || []).forEach((edge) => {
      if (!outgoing.has(edge.from)) outgoing.set(edge.from, []);
      outgoing.get(edge.from).push(edge);
      if (!incoming.has(edge.to)) incoming.set(edge.to, []);
      incoming.get(edge.to).push(edge);
    });
    const filterTypes = ["all", "thesis", "principle", "decision", "constraint", "question", "task", "deprecated"];
    const byType = (types) => visibleNodes().filter((node) => types.includes(node.type));

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text) node.textContent = text;
      return node;
    }

    function label(dict, key) {
      return dict[key] || key;
    }

    function searchableText(node) {
      return [
        node.title,
        node.summary,
        node.rationale,
        node.type,
        node.status,
        node.priority,
        ...(node.tags || []),
        ...(node.implications || [])
      ].join(" ").toLowerCase();
    }

    function visibleNodes() {
      const q = query.trim().toLowerCase();
      return nodes.filter((node) => {
        if (activeType !== "all" && node.type !== activeType) return false;
        if (q && !searchableText(node).includes(q)) return false;
        return true;
      });
    }

    function relatedIds(nodeId) {
      const ids = new Set([nodeId]);
      (outgoing.get(nodeId) || []).forEach((edge) => ids.add(edge.to));
      (incoming.get(nodeId) || []).forEach((edge) => ids.add(edge.from));
      return ids;
    }

    function renderNode(node, labels) {
      const card = el("article", "node");
      card.dataset.type = node.type;
      card.id = node.id;
      card.tabIndex = 0;
      if (focusedId) {
        const related = relatedIds(focusedId);
        if (node.id === focusedId) card.classList.add("is-focused");
        else if (related.has(node.id)) card.classList.add("is-related");
        else card.classList.add("is-dimmed");
      }
      card.appendChild(el("h2", "", node.title || "Untitled"));
      if (node.summary) card.appendChild(el("p", "", node.summary));
      const badges = el("div", "badges");
      badges.appendChild(el("span", "badge", label(labels.type, node.type)));
      badges.appendChild(el("span", "badge", label(labels.status, node.status || "active")));
      if (node.priority) badges.appendChild(el("span", "badge", label(labels.priority, node.priority)));
      (node.tags || []).slice(0, 3).forEach((tag) => badges.appendChild(el("span", "badge", tag)));
      card.appendChild(badges);
      const links = outgoing.get(node.id) || [];
      if (links.length > 0) {
        const linkBox = el("div", "links");
        links.slice(0, 4).forEach((edge) => {
          const target = nodeById.get(edge.to);
          if (target) linkBox.appendChild(el("div", "", `${edge.label || edge.type} -> ${target.title}`));
        });
        card.appendChild(linkBox);
      }
      const detailButton = el("button", "detail-button", labels.details);
      detailButton.type = "button";
      detailButton.addEventListener("click", (event) => {
        event.stopPropagation();
        const expanded = card.dataset.expanded === "true";
        card.dataset.expanded = String(!expanded);
        detailButton.textContent = expanded ? labels.details : labels.hideDetails;
      });
      card.appendChild(detailButton);
      const details = el("div", "details");
      if (node.rationale) {
        details.appendChild(el("strong", "", labels.rationale));
        details.appendChild(el("p", "", node.rationale));
      }
      if ((node.implications || []).length > 0) {
        details.appendChild(el("strong", "", labels.implications));
        const list = el("ul");
        node.implications.forEach((item) => list.appendChild(el("li", "", item)));
        details.appendChild(list);
      }
      const related = [...(outgoing.get(node.id) || []), ...(incoming.get(node.id) || [])];
      if (related.length > 0) {
        details.appendChild(el("strong", "", labels.related));
        const list = el("ul");
        related.forEach((edge) => {
          const other = edge.from === node.id ? nodeById.get(edge.to) : nodeById.get(edge.from);
          if (other) list.appendChild(el("li", "", `${edge.label || edge.type}: ${other.title}`));
        });
        details.appendChild(list);
      }
      card.appendChild(details);
      card.addEventListener("click", () => {
        focusedId = focusedId === node.id ? "" : node.id;
        render(currentLang);
      });
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          focusedId = focusedId === node.id ? "" : node.id;
          render(currentLang);
        }
      });
      return card;
    }

    function render(lang) {
      const labels = i18n[lang] || i18n.zh;
      document.documentElement.lang = lang;
      document.getElementById("meta").textContent = labels.meta;
      document.getElementById("map").setAttribute("aria-label", labels.mapLabel);
      document.getElementById("timeline-title").textContent = labels.timeline;
      searchInput.placeholder = labels.searchPlaceholder;
      resetButton.textContent = labels.reset;
      document.getElementById("hint").textContent = labels.focusHint;
      document.querySelectorAll(".language-toggle button").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.lang === lang));
      });
      filters.replaceChildren();
      filterTypes.forEach((type) => {
        const button = el("button", "filter-button", type === "all" ? labels.all : label(labels.type, type));
        button.type = "button";
        button.dataset.type = type;
        button.setAttribute("aria-pressed", String(activeType === type));
        button.addEventListener("click", () => {
          activeType = type;
          focusedId = "";
          render(currentLang);
        });
        filters.appendChild(button);
      });
      map.replaceChildren();
      const currentVisibleNodes = visibleNodes();
      if (currentVisibleNodes.length === 0) {
        map.appendChild(el("div", "empty-result", labels.noMatch));
      } else {
        labels.lanes.forEach(([title, types]) => {
          const lane = el("div", "lane");
          lane.appendChild(el("div", "lane-title", title));
          const laneNodes = byType(types);
          if (laneNodes.length === 0) {
            const empty = el("article", "node");
            empty.appendChild(el("h2", "", labels.emptyTitle));
            empty.appendChild(el("p", "", labels.emptyBody));
            lane.appendChild(empty);
          } else {
            laneNodes.forEach((node) => lane.appendChild(renderNode(node, labels)));
          }
          map.appendChild(lane);
        });
      }
      if (focusedId && !visibleNodes().some((node) => node.id === focusedId)) {
        focusedId = "";
      }
      const timeline = document.getElementById("timeline");
      timeline.replaceChildren();
      (data.entries || []).slice(-12).reverse().forEach((entry) => {
        const row = el("div", "entry");
        row.appendChild(el("time", "", entry.createdAt || ""));
        row.appendChild(el("div", "", entry.summary || entry.thought || ""));
        timeline.appendChild(row);
      });
      localStorage.setItem(`mindmap-lang:${data.project.id}`, lang);
    }

    document.querySelectorAll(".language-toggle button").forEach((button) => {
      button.addEventListener("click", () => render(button.dataset.lang));
    });
    searchInput.addEventListener("input", (event) => {
      query = event.target.value;
      focusedId = "";
      render(currentLang);
    });
    resetButton.addEventListener("click", () => {
      query = "";
      activeType = "all";
      focusedId = "";
      searchInput.value = "";
      render(currentLang);
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        focusedId = "";
        render(currentLang);
      }
    });
    render(currentLang);
  </script>
</body>
</html>
