version: 1
skills:
  - name: template-writing
    display_name: Template Writing
    name_zh: 模板写作
    category: Knowledge
    version: 0.1.0
    license: Proprietary
    path: skills/template-writing
    description: Draft and fill strict-format DOCX templates from reference materials such as technical proposals, contracts, technical agreements, test protocols, meeting notes, and project documents.
    tagline_en: Draft strict-format DOCX templates from project reference materials.
    tagline_zh: 根据合同、技术协议和项目资料撰写并填充固定格式 DOCX 模板。
  - name: transcript-source-compiler
    display_name: Transcript Source Compiler
    name_zh: 转写来源编译器
    category: Knowledge
    version: 0.1.0
    license: MIT
    path: skills/transcript-source-compiler
    description: Convert long-form speech or sharing-session transcripts into evidence-backed LLM-Wiki source records plus one or more readable articles.
    tagline_en: Turn messy speech transcripts into auditable source records and readable articles.
    tagline_zh: 将大段演讲转写编译成可追溯的来源底稿和可读文章。
  - name: mind-map
    display_name: Mind Map
    name_zh: 项目思维导图
    category: Knowledge
    version: 0.1.0
    license: MIT
    path: skills/mind-map
    description: Record explicit project thinking into an Obsidian-hosted HTML mind map and AI context pack for future implementation agents.
    tagline_en: Preserve project decisions and intent as an interactive mind map.
    tagline_zh: 将项目决策和意图记录为可交互思维导图。
  - name: ms-qwen-vl
    display_name: MS Qwen VL
    name_zh: 魔搭 Qwen-VL 视觉解析
    category: Multimodal
    version: 0.1.0
    license: MIT
    path: skills/ms-qwen-vl
    description: Use ModelScope or SiliconFlow Qwen-VL compatible APIs to analyze images and videos, including description, OCR, visual QA, detection, charts, and YOLO dataset output.
    tagline_en: Analyze images and videos with Qwen-VL, then optionally export YOLO datasets.
    tagline_zh: 用 Qwen-VL 解析图片/视频，并可输出 YOLO 数据集。
  - name: book-to-skill
    display_name: Book to Skill
    name_zh: 书籍转技能
    category: Knowledge
    version: 0.1.0
    license: MIT
    path: skills/book-to-skill
    description: Convert a PDF, EPUB, Markdown, or text book into traceable, executable Agent Skills with references, templates, source-map evidence, and evals.
    tagline_en: Turn books into traceable, testable Agent Skills instead of summaries.
    tagline_zh: 将整本书转成可追溯、可测试、可执行的 Agent Skill。
