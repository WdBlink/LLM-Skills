version: 1
skills:
  - name: pv-forecast-pptx
    display_name: PV Forecast PPTX
    name_zh: 光伏预测汇报 PPTX
    category: Presentation
    version: 0.1.0
    license: Proprietary
    path: skills/air-pptx
    description: Create professional PowerPoint research presentations for photovoltaic and energy forecasting projects using a bundled reference template and presentation resources.
    tagline_en: Build photovoltaic forecasting research presentation decks from bundled templates.
    tagline_zh: 基于模板资源生成光伏与能源预测研究汇报 PPTX。
  - name: template-writing
    display_name: Template Writing
    name_zh: 模板写作
    category: Knowledge
    version: 0.1.0
    license: Proprietary
    path: skills/template-writing
    description: Draft and fill strict-format DOCX templates from reference materials such as technical proposals, contracts, technical agreements, test protocols, meeting notes, and project documents.
    tagline_en: Draft strict-format DOCX templates from project reference materials.
    tagline_zh: 根据合同、技术协议和项目资料撰写并填充固定格式 DOCX 模板。
  - name: transcript-source-compiler
    display_name: Transcript Source Compiler
    name_zh: 转写来源编译器
    category: Knowledge
    version: 0.1.0
    license: MIT
    path: skills/transcript-source-compiler
    description: Convert long-form speech or sharing-session transcripts into evidence-backed LLM-Wiki source records plus one or more readable articles.
    tagline_en: Turn messy speech transcripts into auditable source records and readable articles.
    tagline_zh: 将大段演讲转写编译成可追溯的来源底稿和可读文章。
  - name: mind-map
    display_name: Mind Map
    name_zh: 项目思维导图
    category: Knowledge
    version: 0.2.12
    license: MIT
    path: skills/mind-map
    description: Record explicit project thinking into Obsidian Markdown nodes, project directory anchors, bilingual index filenames, graph-neutral provenance and timeline logs, an interactive HTML mind map, and an AI context pack.
    tagline_en: Preserve project decisions as Obsidian nodes, bilingual index filenames, graph-neutral timeline/provenance, and an interactive HTML map.
    tagline_zh: 将项目决策记录为 Obsidian 双链节点、中英混编索引文件名、图谱中性的时间线/溯源和可交互 HTML 图谱。
  - name: auto-yolo-dataset
    display_name: Auto YOLO Dataset
    name_zh: 自动 YOLO 数据集
    category: Multimodal
    version: 0.1.0
    license: Proprietary
    path: skills/auto-yolo-dataset
    description: Generate object-detection annotations and portable dataset assets from images through an explicit local or remote detector backend.
    tagline_en: Build YOLO, COCO, VOC, and Label Studio assets through a configured detector.
    tagline_zh: 通过本地或远程检测器生成 YOLO、COCO、VOC 和 Label Studio 数据集资产。
  - name: ms-qwen-vl
    display_name: MS Qwen VL
    name_zh: 魔搭 Qwen-VL 视觉解析
    category: Multimodal
    version: 0.1.0
    license: MIT
    path: skills/ms-qwen-vl
    description: Use ModelScope or SiliconFlow Qwen-VL compatible APIs to analyze images and videos, including description, OCR, visual QA, detection, charts, and YOLO dataset output.
    tagline_en: Analyze images and videos with Qwen-VL, then optionally export YOLO datasets.
    tagline_zh: 用 Qwen-VL 解析图片/视频，并可输出 YOLO 数据集。
  - name: book-to-skill
    display_name: Book to Skill
    name_zh: 书籍转技能
    category: Knowledge
    version: 0.1.0
    license: MIT
    path: skills/book-to-skill
    description: Convert a PDF, EPUB, Markdown, or text book into traceable, executable Agent Skills with references, templates, source-map evidence, and evals.
    tagline_en: Turn books into traceable, testable Agent Skills instead of summaries.
    tagline_zh: 将整本书转成可追溯、可测试、可执行的 Agent Skill。
  - name: weekly-report
    display_name: Weekly Report
    name_zh: 中文周报生成器
    category: Knowledge
    version: 0.1.0
    license: Proprietary
    path: skills/weekly-report
    description: Generate Chinese weekly work report DOCX files from recent work logs or a provided log file using a portable self-contained script.
    tagline_en: Generate Chinese weekly report DOCX files from work logs.
    tagline_zh: 从工作日志生成可迁移的中文工作周报 DOCX。
